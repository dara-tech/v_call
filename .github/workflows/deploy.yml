name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 107.175.91.211
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /root/v_call
            git fetch origin main
            git reset --hard origin/main
            npm install
            npm run build --workspace=client
            cd /root/v_call/server
            npm install
            pm2 restart v_call-server --update-env || \
              SERVE_CLIENT_DIST=/root/v_call/client/dist PORT=5001 pm2 start index.js --name v_call-server --cwd /root/v_call/server
