<!DOCTYPE html>
<html>
<body>
  <div id="dm-container" style="width: 640px; height: 360px;"></div>
  <script src="https://geo.dailymotion.com/player.js"></script>
  <script>
    dailymotion.createPlayer('dm-container', { video: 'x5pw0zi' }).then(player => {
      console.log('Player created!', player);
      player.on('play', () => console.log('playing'));
    }).catch(err => console.error('Error creating player', err));
  </script>
</body>
</html>
